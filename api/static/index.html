<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marginalia — clinical assistant</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --ink:#e2e8f0; --muted:#94a3b8;
          --accent:#38bdf8; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--ink); }
  .wrap { max-width:820px; margin:0 auto; padding:28px 20px 60px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 24px; }
  .card { background:var(--card); border:1px solid #334155; border-radius:10px;
          padding:18px; margin-bottom:18px; }
  label { display:block; font-weight:600; margin-bottom:6px; font-size:13px; color:var(--muted); }
  select, textarea, input[type=file] { width:100%; background:#0b1220; color:var(--ink);
          border:1px solid #334155; border-radius:8px; padding:10px; font:inherit; }
  textarea { resize:vertical; min-height:64px; }
  button { background:var(--accent); color:#04222f; border:0; border-radius:8px;
           padding:10px 16px; font-weight:600; cursor:pointer; }
  button.secondary { background:#334155; color:var(--ink); }
  button.ok { background:var(--ok); color:#052e12; }
  button.bad { background:var(--bad); color:#2a0606; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .grow { flex:1; }
  pre { background:#04101c; border:1px solid #243b53; border-radius:8px; padding:12px;
        overflow:auto; white-space:pre-wrap; word-break:break-word; font-size:13px; color:#7dd3fc; }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 8px;
           border-radius:999px; background:#0b1220; border:1px solid #334155; color:var(--muted); margin-right:6px; }
  .src { border-left:3px solid #334155; padding:8px 12px; margin:8px 0; background:#0b1220; border-radius:0 8px 8px 0; }
  .src.cited { border-left-color:var(--accent); }
  .src .tag { font-size:11px; font-weight:700; letter-spacing:.04em; }
  .src.patient .tag { color:var(--warn); }
  .src.guideline .tag { color:var(--accent); }
  .muted { color:var(--muted); font-size:13px; }
  .hidden { display:none; }
  .note { font-size:12px; color:var(--muted); margin-top:6px; }
  .answer { font-size:16px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Marginalia</h1>
  <p class="sub">Two-plane clinical assistant — patient records + guidelines, with PHI masking and human-approved SQL.</p>

  <div class="card">
    <label>Add a guideline PDF (optional)</label>
    <div class="row">
      <input type="file" id="pdf" accept="application/pdf" class="grow" />
      <button class="secondary" onclick="upload()">Upload &amp; index</button>
    </div>
    <div id="uploadMsg" class="note"></div>
  </div>

  <div class="card">
    <label for="patient">Patient in scope</label>
    <select id="patient"></select>

    <label for="question" style="margin-top:14px;">Doctor's question</label>
    <textarea id="question" placeholder="Is the patient's HbA1c above the recommended target?"></textarea>
    <div class="row" style="margin-top:10px;">
      <button id="askBtn" onclick="ask()">Ask</button>
      <span id="status" class="muted"></span>
    </div>
  </div>

  <div id="approval" class="card hidden">
    <label>⏸ Human-in-the-loop — AI-generated SQL awaiting your approval</label>
    <pre id="sql"></pre>
    <div class="row">
      <button class="ok" onclick="decide('approve')">Approve &amp; run</button>
      <button class="bad" onclick="decide('reject')">Reject</button>
    </div>
    <div class="note">Reject and no SQL is ever executed — the assistant refuses instead.</div>
  </div>

  <div id="result" class="card hidden">
    <div id="planes"></div>
    <p class="answer" id="answer"></p>
    <div id="sources"></div>
  </div>
</div>

<script>
let threadId = null;

async function loadPatients() {
  const res = await fetch('/patients');
  const patients = await res.json();
  const sel = document.getElementById('patient');
  sel.innerHTML = patients.map(p =>
    `<option value="${p.patient_id}">${p.name} (${p.key})</option>`).join('');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

async function ask() {
  hide('approval'); hide('result'); threadId = null;
  const question = document.getElementById('question').value.trim();
  const patient_id = parseInt(document.getElementById('patient').value, 10);
  if (!question) { setStatus('Type a question first.'); return; }
  document.getElementById('askBtn').disabled = true;
  setStatus('Thinking… (masking PHI, routing, generating SQL)');
  try {
    const res = await fetch('/clinical/ask', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question, patient_id })
    });
    handleStep(await res.json());
  } catch (e) { setStatus('Error: ' + e); }
  document.getElementById('askBtn').disabled = false;
}

async function decide(decision) {
  setStatus(decision === 'approve' ? 'Running approved SQL…' : 'Rejected — refusing.');
  hide('approval');
  const res = await fetch('/clinical/approve', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ thread_id: threadId, decision })
  });
  handleStep(await res.json());
}

function handleStep(step) {
  if (step.status === 'awaiting_approval') {
    threadId = step.thread_id;
    document.getElementById('sql').textContent = step.sql;
    setStatus('Paused for SQL approval.');
    show('approval');
  } else {
    setStatus('Done.');
    renderResult(step);
  }
}

function renderResult(step) {
  document.getElementById('planes').innerHTML =
    (step.planes || []).map(p => `<span class="badge">${p} plane</span>`).join('');
  document.getElementById('answer').textContent = step.answer || '(no answer)';
  const cited = new Set(step.cited || []);
  document.getElementById('sources').innerHTML = (step.sources || []).map(s => {
    const isCited = cited.has(s.citation_id) ? ' cited' : '';
    const tag = s.kind === 'patient' ? 'PATIENT RECORD' : 'GUIDELINE';
    const detail = s.kind === 'patient'
      ? `<div class="muted">provenance SQL: <code>${s.sql || ''}</code></div>`
      : `<div class="muted">${s.source_file || ''} (p${s.page_start ?? '?'})</div>`;
    return `<div class="src ${s.kind}${isCited}">
      <span class="tag">[${s.citation_id}] ${tag}${isCited ? ' • cited' : ''}</span>
      <div>${s.text}</div>${detail}</div>`;
  }).join('') || '<div class="muted">No evidence gathered.</div>';
  show('result');
}

async function upload() {
  const input = document.getElementById('pdf');
  if (!input.files.length) { document.getElementById('uploadMsg').textContent = 'Pick a PDF first.'; return; }
  const fd = new FormData();
  fd.append('file', input.files[0]);
  document.getElementById('uploadMsg').textContent = 'Indexing…';
  try {
    const res = await fetch('/upload', { method:'POST', body: fd });
    const data = await res.json();
    document.getElementById('uploadMsg').textContent =
      res.ok ? `Indexed ${data.indexed_count} chunks from ${data.source_file}.`
             : ('Error: ' + (data.detail || res.status));
  } catch (e) { document.getElementById('uploadMsg').textContent = 'Error: ' + e; }
}

loadPatients();
</script>
</body>
</html>
